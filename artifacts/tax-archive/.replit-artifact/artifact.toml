kind = "web"
previewPath = "/"
title = "أرشيف الضرائب"
version = "1.0.0"
id = "artifacts/tax-archive"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22950

[services.development]
run = "pnpm --filter @workspace/tax-archive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tax-archive", "run", "build" ]
serve = "static"
publicDir = "artifacts/tax-archive/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22950"
BASE_PATH = "/"
